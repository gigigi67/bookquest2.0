<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - BookQuest</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styleindex.css"> 
</head>
<body>
    <div class="plateform" style="display: none;"></div> 
    <div class="container">
        
        <div class="header">
            <h1 id="welcomeHeader">Welcome back, Reader!</h1>
            <div class="nav-buttons">
                <button id="Dashboard" class="nav-button active">Home</button>
                <button id="achievementsBtn" class="nav-button">Achievements</button>
                <button id="feedsBtn" class="nav-button">Community</button>
            </div>
            <button id="logoutBtn">Logout</button>
        </div>

        <div class="dashboard-content">
            
            <div class="quests-section">
                
                <div class="profile-card">
                    <div class="progress-container">
                        <div class="progress-circle">
                             <div class="progress-inset">
                                <span id="profileLevel">1</span>
                                <span>Level</span>
                            </div>
                        </div>
                    </div>
                    <div class="profile-details">
                        <h3 id="profileUsername">Username</h3>
                        <p>Total Score: <span id="profileScore">0</span> pts</p>
                        <div class="progress-bar-container">
                            <div id="progressBarFill" class="progress-bar-fill"></div>
                        </div>
                        <p class="progress-label">Progress to Level <span id="nextLevelNum">2</span>: <span id="progressPercent">0%</span></p>
                    </div>
                </div>

                <div class="profile-card" style="flex-direction: column; align-items: flex-start; margin-bottom: 20px;">
                    <h3 style="color: #ffffff; font-size: 1.2em; font-weight: 600; margin-bottom: 5px;">AI Book Matchmaker</h3>
                    <p style="color: #a7c0d1; margin-bottom: 15px; font-size: 0.9em;">Get custom book recommendations based on your past reviews!</p>
                    <button id="getRecommendationsBtn" class="complete-btn" style="width: 100%;">Consult the AI</button>
                    <div id="recommendationsOutput" style="margin-top: 15px; color: #f0f0f0; white-space: pre-line; line-height: 1.6; font-size: 0.9em;"></div>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0, 255, 255, 0.2); padding-bottom: 5px; margin-bottom: 15px;">
                    <h2 style="border: none; padding: 0; margin: 0;">Daily Quests</h2>
                    <button id="generateQuestBtn" class="complete-btn" style="padding: 5px 10px; font-size: 0.8em; background: linear-gradient(90deg, #9b59b6, #8e44ad);">✨ Generate AI Quest</button>
                </div>
                
                <ul id="questList">
                    </ul>
            </div>

            <div class="leaderboard-section">
                <h2>Global Leaderboard</h2>
                <div class="table-wrapper">
                    <table id="leaderboardTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Username</th>
                                <th>Score</th>
                                <th>Level</th>
                            </tr>
                        </thead>
                        <tbody>
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
    <script src="index.js"></script>
</body>
</html>
